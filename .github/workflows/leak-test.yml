name: dbn_leak_test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"

      - name: Install latest databento packages
        run: pip install --upgrade databento databento-dbn

      - name: Run leak test
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: timeout 300 python dbn_leak_test.py || true
